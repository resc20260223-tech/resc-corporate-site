<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手仕事雑貨店 つむぎ｜小売</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #8A6A4E;
    --primary-dark: #5C4530;
    --bg: #FAF6EF;
    --accent: #B98A5E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Zen Old Mincho', serif; background: var(--bg); color: #2B2420; line-height: 1.8; }
  img { max-width: 100%; display: block; }
  a { color: inherit; }
  .notice {
    background: var(--primary-dark); color: #fff; text-align: center;
    font-size: 12.5px; padding: 8px 16px;
  }
  .notice a { color: #fff; text-decoration: underline; }
  .hero { position: relative; height: 60vh; min-height: 380px; }
  .hero img { width: 100%; height: 100%; object-fit: cover; }
  .hero::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.5)); }
  .hero-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #fff; padding: 24px; }
  .hero-text .label { font-size: 12px; letter-spacing: 3px; opacity: 0.85; margin-bottom: 14px; }
  .hero-text h1 { font-size: clamp(24px, 4vw, 38px); font-weight: 700; margin-bottom: 16px; }
  .hero-text p { font-size: 14px; max-width: 480px; }
  section { max-width: 900px; margin: 0 auto; padding: 70px 24px; }
  .section-title { font-size: 26px; font-weight: 700; color: var(--primary-dark); margin-bottom: 24px; text-align: center; }
  .about p { font-size: 14.5px; color: #4A4238; }
  .menu-list { list-style: none; margin-top: 20px; }
  .menu-list li { padding: 16px 0; border-bottom: 1px solid rgba(0,0,0,0.08); font-size: 15px; display: flex; justify-content: space-between; }
  .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .gallery img { border-radius: 6px; height: 220px; object-fit: cover; }
  .contact { background: var(--primary); color: #fff; text-align: center; }
  .contact .section-title { color: #fff; }
  .contact p { font-size: 14px; margin-bottom: 8px; }
  .contact .btn { display: inline-block; margin-top: 18px; background: #fff; color: var(--primary-dark); padding: 12px 30px; border-radius: 4px; font-weight: 700; font-size: 13.5px; }
  footer { text-align: center; padding: 24px; font-size: 12px; color: #8A8272; }
  @media (max-width: 700px) { .gallery { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="notice">これはRESCが作成したサンプルサイトです。実店舗ではありません。 <a href="../index.html">RESCのサイトに戻る</a></div>

<div class="hero">
  <img src="images/retail/retail_hero.png" alt="手仕事雑貨店 つむぎ">
  <div class="hero-text">
    <div class="label">小売</div>
    <h1>毎日の暮らしに、手のぬくもりを。</h1>
    <p>手仕事雑貨店 つむぎ</p>
  </div>
</div>

<section class="about">
  <div class="section-title">こだわり</div>
  <p>作家ものの器や木工品、布小物など、暮らしに寄り添う手仕事の品を集めたお店です。一点一点の背景にある物語もあわせてご紹介しています。</p>
</section>

<section style="background:#fff;">
  <div class="section-title">メニュー・サービス</div>
  <ul class="menu-list">
    <li>作家もの陶器</li>
    <li>木工雑貨</li>
    <li>オリジナル布小物</li>
  </ul>
</section>

<section>
  <div class="section-title">ギャラリー</div>
  <div class="gallery">
    <img src="images/retail/retail_gallery1.png">
    <img src="images/retail/retail_gallery2.png">
    <img src="images/retail/retail_gallery3.png">
  </div>
</section>

<section class="contact">
  <div class="section-title">アクセス・お問い合わせ</div>
  <p>福岡県福岡市〇〇区〇〇6-2-9</p>
  <p>営業時間:11:00〜18:00（定休日:月曜日）</p>
  <a class="btn" href="mailto:info@example.com">お問い合わせ</a>
</section>

<footer>手仕事雑貨店 つむぎ（RESC制作サンプル）</footer>

</body>
</html>
